baseURL = "https://zwebzone.github.io/"
defaultContentLanguage = "en"
languageCode = "en"

title = "zwebrain"

theme = "gokarna"

publishDir = "docs"

# Automatically generate robots.txt
enableRobotsTXT = true

enableEmoji = true

[menu]
  

  [[menu.main]]
    # Unique identifer for a menu item
    identifier = "posts"

    url = "/posts/"
    
    # You can add extra information before the name (HTML format is supported), such as icons
    pre = ""

    # You can add extra information after the name (HTML format is supported), such as icons
    post = ""

    # Display name
    name = "Posts"

    # Weights are used to determine the ordering
    weight = 1

  
  [[menu.main]]
    identifier = "projects"
    name = "Projects"
    url = "/projects/"
    weight = 2

  [[menu.main]]
    identifier = "lovely"
    url = "/lovely/"
    weight = 3
    pre = "<span data-feather='smile'></span>"

  [[menu.main]]
    identifier = "tags"
    url = "/tags/"
    weight = 4
    pre = "<span data-feather='tag'></span>"
  
  [[menu.main]]
    identifier = "notes"
    url = "/notes/"
    weight = 5
    pre = "<span data-feather='pen-tool'></span>"

  [[menu.main]]
    identifier = "pursuit"
    url = "/pursuit/"
    weight = 6
    pre = "<span data-feather='activity'></span>"

  #[[menu.main]]
  #  identifier = "github"
  #  url = "https://github.com/zwebzone"
  #  weight = 7
    
    # We use feather-icons: https://feathericons.com/
  #  pre = "<span data-feather='github'></span>"


[params]
  # URL for the avatar on homepage
  avatarURL = "/images/avatar.jpg"

  # Choose one of size-xs, size-s, size-m, size-l & size-xl. (Default: size-m)
  avatarSize = "size-m"

  # Description to display on homepage
  description = "zwebrain is zwewebbrainrainraaiain!"

  # Accent color is displayed when you hover over <a> tags
  accentColor = "#FF4D4D"

  # You can use this to inject any HTML in the <head> tag.
  # Ideal usecase for this is to import custom js/css or add your analytics snippet
  customHeadHTML = ""

  # If you want to display posts on the homepage, the options are
  # "popular" (order posts by weight), "recent" (order posts by date)
  # or "" (do not display, default option)
  showPostsOnHomePage = "recent"

  # Footer text
  footer = "zwebrain"