{{ define "main" }}
  <section class="grinning-page" aria-labelledby="grinning-title">
    <div class="grinning-mark" role="img" aria-label="Birthday cake">🎂</div>

    <h1 id="grinning-title">grinning</h1>
    <p class="grinning-prompt">输入谜底...</p>

    <form class="grinning-form" data-grinning-form>
      <label class="sr-only" for="grinning-input">Your answer</label>
      <input
        id="grinning-input"
        name="answer"
        type="text"
        autocomplete="off"
        maxlength="120"
        placeholder="随便猜猜什么？或者有什么线索了..."
        required
      >
      <button type="submit" aria-label="Submit answer" title="Submit">
        <span aria-hidden="true">&rarr;</span>
      </button>
    </form>

    <p class="grinning-response" data-grinning-response aria-live="polite"></p>

    <div class="grinning-music" data-grinning-music hidden>
      <div class="grinning-music-frame" data-grinning-music-frame></div>
    </div>

    {{- with .Content }}
      <div class="grinning-content">
        {{ . }}
      </div>
    {{- end }}
  </section>

  {{- with .Site.Data.grinning.answers }}
    <script id="grinning-answers" type="application/json">{{ . | jsonify | safeJS }}</script>
  {{- end }}
  {{- with .Site.Data.grinning.music }}
    <script id="grinning-music" type="application/json">{{ . | jsonify | safeJS }}</script>
  {{- end }}
  {{- $grinningJsVersion := readFile "themes/zwebrain-home/static/js/grinning.js" | sha256 -}}
  <script src="{{ "js/grinning.js" | relURL }}?v={{ $grinningJsVersion }}" defer></script>
{{ end }}
